<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Splitter</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none !important; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media screen and (max-height: 550px) { body { padding-bottom: 40px; } #ai-ocr-drawer { max-height: 92vh !important; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s forwards; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">

    <div id="toast-container" class="fixed top-10 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 w-full max-w-[90%] pointer-events-none"></div>

    <div class="w-full max-w-md my-6">
        <h2 id="app-main-title" class="text-2xl font-bold mb-5 text-center text-gray-800">📱 Expense Splitter</h2>
        
        <div id="auth-section" class="card">
            <h3 id="auth-title" class="text-xl font-bold mb-4 text-gray-800">User Login</h3>
            <div id="login-fields-block">
                <input type="email" id="login-email" placeholder="Gmail Address" class="w-full p-2 mb-3 border rounded-md">
            </div>
            <div id="register-fields-block" class="hidden">
                <input type="email" id="reg-email" placeholder="Gmail Address" class="w-full p-2 mb-3 border rounded-md">
                <input type="text" id="reg-username" placeholder="Username (no @)" class="w-full p-2 mb-3 border rounded-md">
            </div>
            <input type="password" id="auth-password" placeholder="Password" class="w-full p-2 mb-4 border rounded-md">
            
            <div id="login-actions">
                <button onclick="login()" class="w-full bg-blue-500 text-white py-2 rounded-lg mb-4">Login</button>
                <div class="text-center border-t pt-4"><button onclick="toggleAuthMode(true)" class="text-blue-500 text-sm">Create New Account</button></div>
            </div>
            <div id="register-actions" class="hidden">
                <button onclick="register()" class="w-full bg-gray-500 text-white py-2 rounded-lg mb-4">Register Now</button>
                <div class="text-center border-t pt-4"><button onclick="toggleAuthMode(false)" class="text-blue-500 text-sm">Back to Login</button></div>
            </div>
        </div>

        <div id="main-section" class="card hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">Hello, @<span id="user-display" class="text-blue-600"></span>!</h3>
                <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 text-xs rounded">Logout</button>
            </div>
            
            <div class="flex gap-3 mb-4">
                <div class="flex-1 bg-red-50 p-3 rounded-xl text-center"><p class="text-[10px] text-red-500 font-bold uppercase">You Owe</p><p class="text-xl font-bold text-red-600" id="total-owe">$0.00</p></div>
                <div class="flex-1 bg-green-50 p-3 rounded-xl text-center"><p class="text-[10px] text-green-600 font-bold uppercase">You Are Owed</p><p class="text-xl font-bold text-green-600" id="total-owed">$0.00</p></div>
            </div>

            <h4 class="font-bold text-gray-700 mb-2">➕ Request Money</h4>
            <div id="recent-friends-container" class="mb-2 hidden">
                <div class="flex justify-between items-center mb-1"><p class="text-[10px] text-gray-400 font-bold">Recent Friends</p><button onclick="clearFriendSelection()" class="text-[10px] text-red-500 hidden" id="clear-select-btn">Clear</button></div>
                <div id="recent-friends-list" class="flex gap-2 overflow-x-auto hide-scrollbar pb-1"></div>
            </div>
            <input type="text" id="debtor-input" placeholder="Friend's username" class="w-full p-2 mb-3 border rounded-md">
            <input type="number" id="amount" placeholder="Amount ($)" class="w-full p-2 mb-3 border rounded-md">
            <input type="text" id="description" placeholder="Description" class="w-full p-2 mb-4 border rounded-md">
            <button onclick="sendRequest()" class="w-full bg-blue-500 text-white py-2 rounded-md">Send Request</button>
            
            <hr class="my-4">
            <div class="flex justify-between items-center mb-2">
                <h4 class="font-bold text-gray-700">📊 Dashboard</h4>
                <button onclick="toggleHistory()" id="history-toggle-btn" class="bg-gray-200 text-xs px-3 py-1 rounded">Show History</button>
            </div>
            <div id="request-list" class="text-sm mt-2 flex flex-col gap-2"></div>
            <div id="history-list" class="text-sm mt-2 hidden flex flex-col gap-2"></div>
        </div>
    </div>

    <div id="partial-modal" class="modal-overlay hidden">
        <div class="bg-white p-6 rounded-xl w-80 mx-4">
            <h4 class="font-bold mb-2">Partial Payment</h4>
            <p class="text-xs text-gray-500 mb-4">Total: $<span id="modal-total-display">0</span></p>
            <input type="number" id="modal-partial-amount" placeholder="0.00" class="w-full p-2 border rounded-md mb-4">
            <div class="flex gap-2 justify-end">
                <button onclick="closePartialModal()" class="px-3 py-1 bg-gray-200 rounded">Cancel</button>
                <button onclick="submitPartialPayment()" class="px-3 py-1 bg-green-600 text-white rounded">Confirm</button>
            </div>
        </div>
    </div>

    <input type="file" id="ai-camera-input" accept="image/*" capture="environment" class="hidden">
    <button id="ai-btn-scan" class="fixed bottom-8 right-6 w-14 h-14 bg-blue-500 text-white rounded-full shadow-2xl flex items-center justify-center hidden z-[90]">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>

    <div id="ai-ocr-modal" class="modal-overlay hidden" style="align-items: flex-end;">
        <div id="ai-ocr-drawer" class="bg-white w-full max-w-md max-h-[85vh] rounded-t-2xl p-5 overflow-y-auto pb-8 shadow-2xl transform translate-y-full transition-transform">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="font-bold">AI Receipt Splitter</h3>
                <button onclick="toggleAiModal(false)" class="text-2xl">&times;</button>
            </div>
            <div id="ai-ocr-skeleton" class="animate-pulse hidden"><div class="h-10 bg-gray-200 rounded mb-2"></div><div class="h-10 bg-gray-200 rounded"></div></div>
            <div id="ai-ocr-content" class="hidden">
                <div id="scanned-items-container" class="space-y-2 mb-4 max-h-[50vh] overflow-y-auto"></div>
                <button onclick="submitAiSplitBills()" id="ai-btn-submit-split" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold">Post Bills</button>
            </div>
        </div>
    </div>

    <script>
        // --- Supabase Config ---
        const supabaseUrl = "https://zrpgelaakysmkemxzdfb.supabase.co";
        const supabaseKey = "sb_publishable_A5kHkD-Bks-II1zFnv-7tQ_YBBqkKxp";
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let currentUser = null, myUsername = "", showingHistory = false;
        let selectedFriends = [], globalUniqueFriends = new Set(), globalFriendBalances = {}, currentPartial = null;
        let aiItems = [], aiSelIdx = null;

        // --- Utils ---
        function showToast(msg, type='success') {
            const c = document.getElementById('toast-container'), t = document.createElement('div');
            t.className = `p-3 rounded-xl shadow-lg text-white text-sm font-medium transition-all transform -translate-y-10 opacity-0 ${type==='error'?'bg-red-500':'bg-green-600'}`;
            t.innerText = msg; c.appendChild(t);
            setTimeout(() => { t.classList.remove('-translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { t.classList.add('-translate-y-10', 'opacity-0'); setTimeout(()=>t.remove(), 300); }, 3000);
        }

        // --- UI & Logic ---
        function toggleAuthMode(isReg) {
            document.getElementById('auth-title').innerText = isReg ? "Create Account" : "User Login";
            document.getElementById('login-fields-block').classList.toggle('hidden', isReg);
            document.getElementById('login-actions').classList.toggle('hidden', isReg);
            document.getElementById('register-fields-block').classList.toggle('hidden', !isReg);
            document.getElementById('register-actions').classList.toggle('hidden', !isReg);
        }

        async function checkUser() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                currentUser = user;
                const { data } = await sb.from('profiles').select('username').eq('id', user.id).single();
                myUsername = data ? data.username : user.email.split('@')[0];
                document.getElementById('user-display').innerText = myUsername;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                document.getElementById('ai-btn-scan').classList.remove('hidden');
                document.getElementById('app-main-title').classList.add('hidden');
                loadRequests();
            }
        }

        async function login() {
            const e = document.getElementById('login-email').value, p = document.getElementById('auth-password').value;
            const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
            if(error) showToast(error.message, 'error'); else checkUser();
        }

        async function register() {
            const e = document.getElementById('reg-email').value, u = document.getElementById('reg-username').value.replace('@',''), p = document.getElementById('auth-password').value;
            const { data, error } = await sb.auth.signUp({ email: e, password: p });
            if(error) return showToast(error.message, 'error');
            await sb.from('profiles').insert([{ id: data.user.id, username: u }]);
            await sb.auth.signInWithPassword({ email: e, password: p }); checkUser();
        }

        async function logout() { await sb.auth.signOut(); location.reload(); }

        async function loadRequests() {
            const { data } = await sb.from('requests').select('*').order('created_at', { ascending: false });
            let owe=0, owed=0, aH='', hH='', fSet=new Set(), fBal={};
            if(!data) return;
            data.forEach(r => {
                const isC = r.creditor === myUsername, isD = r.debtor === myUsername;
                if(isC) fSet.add(r.debtor); if(isD) fSet.add(r.creditor);
                if(r.status !== 'completed') {
                    if(isC){ owed+=r.amount; fBal[r.debtor]=(fBal[r.debtor]||0)+r.amount; }
                    if(isD){ owe+=r.amount; fBal[r.creditor]=(fBal[r.creditor]||0)-r.amount; }
                }
                let c = `<div class="p-3 bg-white border rounded-lg mb-2 shadow-sm flex justify-between">
                    <div><p class="font-bold">${r.description}</p><p class="text-xs text-gray-500">${isC?'To: @'+r.debtor:'From: @'+r.creditor}</p></div>
                    <div class="text-right"><p class="font-bold ${isC?'text-green-600':'text-red-500'}">$${r.amount.toFixed(2)}</p><span class="text-[10px] bg-blue-100 text-blue-600 px-1 rounded">${r.status}</span></div>
                </div>`;
                if(r.status !== 'completed'){
                    c += `<div class="flex justify-end gap-2 -mt-1 mb-3">`;
                    if(isD) c += `<button onclick="openPartialPayModal('${r.id}',${r.amount})" class="text-xs bg-gray-200 px-2 py-1 rounded">Partial</button><button onclick="payRequest('${r.id}')" class="text-xs bg-green-500 text-white px-2 py-1 rounded">Pay Full</button>`;
                    if(isC) c += `<button onclick="deleteRequest('${r.id}')" class="text-xs text-red-400 px-2 py-1">Cancel</button>`;
                    c += `</div>`;
                    aH += c;
                } else hH += c;
            });
            globalUniqueFriends = fSet; globalFriendBalances = fBal;
            document.getElementById('total-owe').innerText = `$${owe.toFixed(2)}`;
            document.getElementById('total-owed').innerText = `$${owed.toFixed(2)}`;
            document.getElementById('request-list').innerHTML = aH || '<p class="text-xs text-gray-400">No pending requests.</p>';
            document.getElementById('history-list').innerHTML = hH || '<p class="text-xs text-gray-400">No history.</p>';
            renderChips();
        }

        function toggleHistory() {
            showingHistory = !showingHistory;
            document.getElementById('request-list').classList.toggle('hidden', showingHistory);
            document.getElementById('history-list').classList.toggle('hidden', !showingHistory);
            document.getElementById('history-toggle-btn').innerText = showingHistory ? "Show Pending" : "Show History";
        }

        function renderChips() {
            const lst = document.getElementById('recent-friends-list'); lst.innerHTML = '';
            document.getElementById('recent-friends-container').classList.toggle('hidden', globalUniqueFriends.size === 0);
            Array.from(globalUniqueFriends).forEach(f => {
                const b = document.createElement('button'), sel = selectedFriends.includes(f);
                b.className = `px-3 py-1 rounded-full text-xs border ${sel?'bg-blue-500 text-white':'bg-white'}`;
                b.innerText = `@${f}`; b.onclick = () => { 
                    sel ? selectedFriends.splice(selectedFriends.indexOf(f),1) : selectedFriends.push(f); 
                    renderChips(); updateInp(); 
                };
                lst.appendChild(b);
            });
        }
        function updateInp() {
            const i = document.getElementById('debtor-input');
            i.value = selectedFriends.length ? 'Selected: ' + selectedFriends.join(',') : '';
            document.getElementById('clear-select-btn').classList.toggle('hidden', !selectedFriends.length);
        }
        function clearFriendSelection() { selectedFriends = []; updateInp(); renderChips(); }

        async function sendRequest() {
            const t = selectedFriends.length ? selectedFriends : [document.getElementById('debtor-input').value.replace('@','')];
            const a = parseFloat(document.getElementById('amount').value), d = document.getElementById('description').value;
            if(!t[0] || isNaN(a)) return showToast('Invalid input', 'error');
            let pAmt = selectedFriends.length ? a/(selectedFriends.length+1) : a;
            for(let f of t) { if(f !== myUsername) await sb.from('requests').insert([{ creditor: myUsername, debtor: f, amount: pAmt, description: d||'Split', status: 'pending' }]); }
            showToast('Sent!'); document.getElementById('amount').value=''; document.getElementById('description').value=''; clearFriendSelection(); loadRequests();
        }

        async function payRequest(id) { await sb.from('requests').update({ status: 'completed' }).eq('id', id); showToast('Paid!'); loadRequests(); }
        async function deleteRequest(id) { await sb.from('requests').delete().eq('id', id); showToast('Cancelled'); loadRequests(); }
        
        function openPartialPayModal(id, tot) { currentPartial = {id, tot}; document.getElementById('modal-total-display').innerText = tot; document.getElementById('partial-modal').classList.remove('hidden'); }
        function closePartialModal() { document.getElementById('partial-modal').classList.add('hidden'); }
        async function submitPartialPayment() {
            const p = parseFloat(document.getElementById('modal-partial-amount').value);
            if(isNaN(p) || p<=0 || p>=currentPartial.tot) return;
            await sb.from('requests').update({ amount: currentPartial.tot - p, status: 'partial' }).eq('id', currentPartial.id);
            closePartialModal(); showToast('Partial paid!'); loadRequests();
        }

        // --- AI OCR ---
        document.getElementById('ai-btn-scan').onclick = () => document.getElementById('ai-camera-input').click();
        document.getElementById('ai-camera-input').onchange = (e) => {
            if(!e.target.files[0]) return;
            toggleAiModal(true); document.getElementById('ai-ocr-skeleton').classList.remove('hidden'); document.getElementById('ai-ocr-content').classList.add('hidden');
            const r = new FileReader();
            r.onload = (ev) => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = async () => {
                    const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
                    let w = img.width, h = img.height, max = 1000;
                    if(w>h && w>max){ h*=max/w; w=max; } else if(h>max){ w*=max/h; h=max; }
                    cvs.width=w; cvs.height=h; ctx.drawImage(img,0,0,w,h);
                    const b64 = cvs.toDataURL('image/jpeg', 0.7).split(',')[1];
                    try {
                        const { data, error } = await sb.functions.invoke('ai-receipt-ocr', { body: { image: b64 } });
                        if(error || !data.items) throw new Error("Format error");
                        aiItems = data.items.map(i => ({ n: i.item_name, a: parseFloat(i.amount), d: [] }));
                        renderAiItems();
                    } catch(err) { showToast('AI Error','error'); toggleAiModal(false); }
                };
            };
            r.readAsDataURL(e.target.files[0]); e.target.value = '';
        };

        function renderAiItems() {
            document.getElementById('ai-ocr-skeleton').classList.add('hidden'); document.getElementById('ai-ocr-content').classList.remove('hidden');
            const c = document.getElementById('scanned-items-container'); c.innerHTML = '';
            aiItems.forEach((i, idx) => {
                const d = document.createElement('div');
                d.className = `p-2 border rounded-lg cursor-pointer ${aiSelIdx===idx?'bg-blue-100 border-blue-500':'bg-gray-50'}`;
                d.innerHTML = `<div class="flex justify-between font-bold text-sm"><span>${i.n}</span><span>$${i.a.toFixed(2)}</span></div><p class="text-[10px] text-gray-500">${i.d.length?i.d.map(x=>'@'+x).join(' '):'Everyone'}</p>`;
                d.onclick = () => { aiSelIdx = aiSelIdx===idx ? null : idx; renderAiItems(); };
                c.appendChild(d);
            });
            const oldToggle = window.toggleFriendSelection;
            window.toggleFriendSelection = (u) => {
                if(!document.getElementById('ai-ocr-modal').classList.contains('hidden')){
                    if(aiSelIdx===null) return showToast('Select item first','error');
                    let t = aiItems[aiSelIdx].d; t.includes(u) ? t.splice(t.indexOf(u),1) : t.push(u); renderAiItems();
                } else { sel ? selectedFriends.splice(selectedFriends.indexOf(u),1) : selectedFriends.push(u); renderChips(); updateInp(); }
            };
        }

        async function submitAiSplitBills() {
            for(let i of aiItems) {
                let t = i.d.length ? i.d : selectedFriends; if(!t.length) continue;
                let a = i.a / (t.length + 1);
                for(let u of t) await sb.from('requests').insert([{ creditor: myUsername, debtor: u, amount: a, description: `[AI] ${i.n}`, status: 'pending' }]);
            }
            showToast('AI Bills Sent!'); toggleAiModal(false); loadRequests();
        }

        function toggleAiModal(s) {
            const m = document.getElementById('ai-ocr-modal'), d = document.getElementById('ai-ocr-drawer');
            if(s){ m.classList.remove('hidden'); d.classList.add('animate-slide-up'); }
            else { m.classList.add('hidden'); aiItems=[]; aiSelIdx=null; }
        }

        window.onload = checkUser;
    </script>
</body>
</html>
