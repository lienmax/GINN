<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Splitter & Requester</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Splitter">
    <link class="apple-touch-icon" rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none !important; }
        .request-item { border-bottom: 1px solid #eee; padding: 14px 0; }
        .request-item:last-child { border-bottom: none; }
        .btn-sm { padding: 4px 10px; font-size: 13px; border-radius: 6px; font-weight: 500; transition: all 0.2s; }
        input, button { font-size: 16px !important; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-center items-center p-4">
    <div class="w-full max-w-md my-6">
        <h2 class="text-2xl font-bold mb-5 text-center text-gray-800">📱 Expense Splitter</h2>
        
        <div id="auth-section" class="card">
            <h3 id="auth-title" class="text-xl font-bold mb-4 text-gray-800">User Login</h3>
            <div id="login-fields-block">
                <label class="block text-sm font-medium text-gray-700 mb-1">Gmail Address</label>
                <input type="email" id="login-email" placeholder="Enter your registered Gmail" class="w-full p-2 mb-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div id="register-fields-block" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Gmail Address</label>
                <input type="email" id="reg-email" placeholder="Enter your real Gmail" class="w-full p-2 mb-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <label class="block text-sm font-medium text-gray-700 mb-1">Custom Username</label>
                <input type="text" id="reg-username" placeholder="e.g., alex123 (No '@' symbol)" class="w-full p-2 mb-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="auth-password" placeholder="Min 6 characters" class="w-full p-2 mb-4 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <div id="login-actions">
                <button onclick="login()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-lg py-2.5 mb-4 shadow transition duration-200">Login</button>
                <div class="text-center border-t pt-4">
                    <p class="text-sm text-gray-500 mb-2">Don't have an account?</p>
                    <button onclick="toggleAuthMode(true)" class="text-blue-500 hover:underline font-medium text-sm">Create New Account</button>
                </div>
            </div>
            <div id="register-actions" class="hidden">
                <button onclick="register()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-medium rounded-lg py-2.5 mb-4 shadow transition duration-200">Register Now</button>
                <div class="text-center border-t pt-4">
                    <p class="text-sm text-gray-500 mb-2">Already have an account?</p>
                    <button onclick="toggleAuthMode(false)" class="text-blue-500 hover:underline font-medium text-sm">Back to Login</button>
                </div>
            </div>
        </div>

        <div id="main-section" class="card hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-800">Hello, @<span id="user-display" class="text-blue-600">User</span>!</h3>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 text-xs font-medium rounded shadow transition duration-200" style="height: auto;">Logout</button>
            </div>
            
            <div class="flex gap-2 mb-4">
                <input type="text" id="new-username-input" placeholder="Enter new username" class="flex-1 p-1 text-xs border rounded border-gray-300" style="height: 32px;">
                <button onclick="changeUsername()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs px-3 rounded font-medium shadow-sm" style="height: 32px;">Edit Name</button>
            </div>
            
            <div class="bg-yellow-50 p-4 border border-yellow-200 rounded-xl mb-6">
                <div class="flex justify-between items-center mb-2">
                    <h4 class="text-xs font-bold text-yellow-800 uppercase tracking-wider">🔔 Notification Center</h4>
                    <button id="enable-notif-btn" onclick="requestNotificationPermission()" class="hidden bg-blue-500 hover:bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded shadow">Enable Phone Notifications</button>
                </div>
                <div id="noti-list" class="text-xs text-gray-500 max-h-40 overflow-y-auto flex flex-col gap-1">No new notifications.</div>
            </div>
            
            <hr class="my-4">
            
            <h4 class="text-md font-bold text-gray-700 mb-3">➕ Request Money</h4>
            <label class="block text-xs font-medium text-gray-500 mb-1">Friend's Username</label>
            <input type="text" id="debtor-input" placeholder="e.g., alex123" class="w-full p-2 mb-3 border border-gray-300 rounded-md">
            
            <label class="block text-xs font-medium text-gray-500 mb-1">Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00" class="w-full p-2 mb-3 border border-gray-300 rounded-md">
            
            <label class="block text-xs font-medium text-gray-500 mb-1">Reason / Description</label>
            <input type="text" id="description" placeholder="e.g., Dinner, Hotpot" class="w-full p-2 mb-4 border border-gray-300 rounded-md">
            
            <button onclick="sendRequest()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 rounded-md shadow" style="height: auto;">Send Payment Request</button>
            
            <hr class="my-4">
            
            <h4 class="text-md font-bold text-gray-700 mb-2">📊 Active Requests & Bills</h4>
            <div id="request-list" class="text-sm text-gray-500 mt-2">Loading dashboard...</div>
        </div>
    </div>

    <div id="partial-modal" class="modal-overlay hidden">
        <div class="bg-white p-6 rounded-xl shadow-xl w-80 mx-4">
            <h4 class="text-md font-bold text-gray-800 mb-2">💰 Partial Payment</h4>
            <p class="text-xs text-gray-500 mb-4">Total bill amount is $<span id="modal-total-display">0</span>. How much would you like to pay right now?</p>
            <label class="block text-xs font-medium text-gray-500 mb-1">Payment Amount ($)</label>
            <input type="number" id="modal-partial-amount" placeholder="0.00" class="w-full p-2 border rounded-md mb-4 focus:outline-none focus:ring-2 focus:ring-green-500">
            <div class="flex gap-2 justify-end">
                <button onclick="closePartialModal()" class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-medium rounded">Cancel</button>
                <button onclick="submitPartialPayment()" class="px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white text-xs font-medium rounded shadow">Confirm Payment</button>
            </div>
        </div>
    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = "https://zrpgelaakysmkemxzdfb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_A5kHkD-Bks-II1zFnv-7tQ_YBBqkKxp";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null; 
        let myUsername = ""; 
        let realtimeChannel = null;

        function toggleAuthMode(isRegistering) {
            const title = document.getElementById('auth-title');
            const loginActions = document.getElementById('login-actions');
            const registerActions = document.getElementById('register-actions');
            const loginFieldsBlock = document.getElementById('login-fields-block');
            const registerFieldsBlock = document.getElementById('register-fields-block');
            document.getElementById('login-email').value = ''; 
            document.getElementById('reg-email').value = ''; 
            document.getElementById('reg-username').value = ''; 
            document.getElementById('auth-password').value = '';
            if (isRegistering) {
                title.innerText = "Create New Account"; 
                loginFieldsBlock.classList.add('hidden'); 
                registerFieldsBlock.classList.remove('hidden'); 
                loginActions.classList.add('hidden'); 
                registerActions.classList.remove('hidden');
            } else {
                title.innerText = "User Login"; 
                loginFieldsBlock.classList.remove('hidden'); 
                registerFieldsBlock.classList.add('hidden'); 
                loginActions.classList.remove('hidden'); 
                registerActions.classList.add('hidden');
            }
        }

        function triggerPhoneNotification(title, messageBody) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: messageBody, icon: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" });
            }
        }

        async function requestNotificationPermission() {
            if ("Notification" in window) {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    alert("Notification permission successfully granted!");
                    document.getElementById('enable-notif-btn').classList.add('hidden');
                    triggerPhoneNotification("💵 Expense Splitter", "Push notifications connected successfully!");
                } else { alert("Notification permission denied."); }
            }
        }

        function updateNotificationButtonUI() {
            const btn = document.getElementById('enable-notif-btn');
            if ("Notification" in window && Notification.permission === "default") { btn.classList.remove('hidden'); }
            else { btn.classList.add('hidden'); }
        }

        async function checkUser() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (user || !userError) { 
                    currentUser = user;
                    const { data: profile } = await supabaseClient.from('profiles').select('username').eq('id', user.id).maybeSingle();
                    myUsername = profile ? profile.username : (user.user_metadata?.username || user.email.split('@')[0]);
                    showMainPage(); 
                } else { showAuthPage(); }
            } catch (err) { showAuthPage(); }
        }
        window.onload = function() { checkUser(); };

        async function register() {
            const email = document.getElementById('reg-email').value.trim();
            const username = document.getElementById('reg-username').value.trim().toLowerCase();
            const password = document.getElementById('auth-password').value;
            if (!email || !username || !password || username.includes('@')) { alert("Invalid inputs."); return; }
            try {
                const { data, error } = await supabaseClient.auth.signUp({ email, password, options: { data: { username } } });
                if (error) throw error;
                if (data?.user) { await supabaseClient.from('profiles').insert([{ id: data.user.id, username }]); }
                alert("Registered successfully! You can now log in."); toggleAuthMode(false);
            } catch (e) { alert("Registration failed: " + e.message); }
        }

        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('auth-password').value;
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user; await checkUser();
            } catch (e) { alert("Login failed: " + e.message); }
        }

        async function logout() { 
            if (realtimeChannel) { supabaseClient.removeChannel(realtimeChannel); realtimeChannel = null; }
            await supabaseClient.auth.signOut(); currentUser = null; myUsername = ""; showAuthPage();
        }

        function showMainPage() {
            document.getElementById('auth-section').classList.add('hidden'); 
            document.getElementById('main-section').classList.remove('hidden'); 
            document.getElementById('user-display').innerText = myUsername;
            updateNotificationButtonUI();
            Promise.all([loadRequests(), loadNotifications()]); setupRealtime();
        }
        function showAuthPage() { document.getElementById('main-section').classList.add('hidden'); document.getElementById('auth-section').classList.remove('hidden'); }

        async function changeUsername() {
            const newName = document.getElementById('new-username-input').value.trim().toLowerCase();
            if (!newName || newName.includes('@') || newName === myUsername) { alert("Invalid username."); return; }
            const oldUsername = myUsername;
            try {
                const { error } = await supabaseClient.from('profiles').update({ username: newName }).eq('id', currentUser.id);
                if (error) throw error;
                myUsername = newName;
                try { await supabaseClient.from('requests').update({ from_user: newName }).eq('from_user', oldUsername); } catch(e){}
                try { await supabaseClient.from('requests').update({ to_user: newName }).eq('to_user', oldUsername); } catch(e){}
                try { await supabaseClient.from('notifications').update({ to_user: newName }).eq('to_user', oldUsername); } catch(e){}
                alert("Username updated!"); document.getElementById('user-display').innerText = myUsername;
                Promise.all([loadRequests(), loadNotifications()]); setupRealtime();
            } catch (e) { alert("Failed: " + e.message); myUsername = oldUsername; }
        }

        function setupRealtime() {
            if (realtimeChannel) { supabaseClient.removeChannel(realtimeChannel); }
            realtimeChannel = supabaseClient.channel('custom-db-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'notifications' }, (payload) => {
                    if ((payload.new && payload.new.to_user === myUsername) || (payload.old && payload.old.to_user === myUsername)) {
                        if (payload.eventType === 'INSERT') { triggerPhoneNotification("💵 Alert", payload.new.message); }
                        loadNotifications();
                    }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'requests' }, (payload) => {
                    const record = payload.new || payload.old;
                    if (record && (record.to_user === myUsername || record.from_user === myUsername)) {
                        if (payload.eventType === 'INSERT' && record.to_user === myUsername) { 
                            triggerPhoneNotification("➕ Request", `@${record.from_user} requested $${record.amount}`); 
                        }
                        loadRequests();
                    }
                }).subscribe();
        }

        async function sendRequest() {
            const targetInput = document.getElementById('debtor-input').value.trim().toLowerCase();
            const amount = parseFloat(document.getElementById('amount').value);
            const description = document.getElementById('description').value;
            if (!targetInput || !amount) { alert("Fill fields."); return; }
            const searchTarget = targetInput.includes('@') ? targetInput.split('@')[0] : targetInput;
            try {
                const { data: receiver } = await supabaseClient.from('profiles').select('username').eq('username', searchTarget).maybeSingle();
                if (!receiver || receiver.username === myUsername) { alert("Invalid user."); return; }
                await supabaseClient.from('requests').insert([{ from_user: myUsername, to_user: receiver.username, amount, description, status: 'pending' }]);
                await supabaseClient.from('notifications').insert([{ to_user: receiver.username, message: `💰 @${myUsername} requested $${amount} for [${description || 'Uncategorized'}]` }]);
                alert("Request sent!"); document.getElementById('debtor-input').value = ''; document.getElementById('amount').value = ''; document.getElementById('description').value = '';
                await loadRequests();
            } catch (e) { alert("Failed."); }
        }

        async function loadRequests() {
            try {
                const { data, error } = await supabaseClient.from('requests').select('*').or(`to_user.eq.${myUsername},from_user.eq.${myUsername}`).not('status', 'in', '("paid","rejected")');
                const listDiv = document.getElementById('request-list');
                if (!data || data.length === 0) { listDiv.innerHTML = "<p style='color:gray;'>No active requests.</p>"; return; }
                listDiv.innerHTML = '';
                data.forEach(req => {
                    const item = document.createElement('div'); item.className = 'request-item flex flex-col gap-2';
                    const isDebtor = (req.to_user === myUsername); 
                    let statusBadge = "", actionButtons = "";
                    
                    switch(req.status) {
                        case 'pending':
                            statusBadge = `<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-0.5 rounded font-bold">Pending Approval</span>`;
                            if (isDebtor) {
                                actionButtons = `
                                    <div class="flex gap-2 justify-end">
                                        <button class="btn-sm bg-red-500 text-white hover:bg-red-600" onclick="updateStatus('${req.id}', 'rejected', '${req.from_user}', 'rejected request.')">Reject</button>
                                        <button class="btn-sm bg-blue-500 text-white hover:bg-blue-600" onclick="updateStatus('${req.id}', 'approved', '${req.from_user}', 'accepted request.')">Accept</button>
                                    </div>`;
                            } else { actionButtons = `<span class="text-xs text-gray-400 italic text-right">Awaiting approval...</span>`; }
                            break;
                        case 'approved':
                            statusBadge = `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded font-bold">Approved / Awaiting Payment</span>`;
                            if (isDebtor) {
                                // 這裡引進外部功能的 Pay Partially 觸發器（如果外部 JS 存在就會生效）
                                actionButtons = `
                                    <div class="flex gap-2 justify-end">
                                        <button class="btn-sm bg-amber-500 text-white hover:bg-amber-600" onclick="if(typeof openPartialModal === 'function'){ openPartialModal(${JSON.stringify(req).replace(/"/g, '&quot;')}) }else{ alert('Partial Pay file missing!') }">Pay Partially</button>
                                        <button class="btn-sm bg-green-600 text-white hover:bg-green-700" onclick="updateStatus('${req.id}', 'payment_submitted', '${req.from_user}', 'marked paid. Verify.')">Mark as Paid</button>
                                    </div>`;
                            } else { actionButtons = `<span class="text-xs text-gray-400 italic text-right">Waiting for friend to pay...</span>`; }
                            break;
                        case 'payment_submitted':
                            statusBadge = `<span class="bg-purple-100 text-purple-800 text-xs px-2 py-0.5 rounded font-bold">Payment Submitted</span>`;
                            if (!isDebtor) { 
                                actionButtons = `
                                    <div class="flex gap-2 justify-end">
                                        <button class="btn-sm bg-red-500 text-white hover:bg-red-600" onclick="updateStatus('${req.id}', 'approved', '${req.to_user}', 'declined payment confirmation.')">Reject Payment</button>
                                        <button class="btn-sm bg-green-600 text-white hover:bg-green-700" onclick="updateStatus('${req.id}', 'paid', '${req.to_user}', 'confirmed payment!')">Accept & Close</button>
                                    </div>`;
                            } else { actionButtons = `<span class="text-xs text-gray-400 italic text-right">Waiting for verification...</span>`; }
                            break;
                        case 'partial_submitted':
                            // 外部 JS 所控制的過渡狀態
                            const partialAmt = req.partial_amount || 0;
                            statusBadge = `<span class="bg-orange-100 text-orange-800 text-xs px-2 py-0.5 rounded font-bold">Partial Paid ($${partialAmt})</span>`;
                            if (!isDebtor) {
                                actionButtons = `
                                    <div class="flex gap-2 justify-end">
                                        <button class="btn-sm bg-red-500 text-white hover:bg-red-600" onclick="updateStatus('${req.id}', 'approved', '${req.to_user}', 'declined partial payment.')">Reject</button>
                                        <button class="btn-sm bg-green-600 text-white hover:bg-green-700" onclick="if(typeof acceptPartialSplitting === 'function'){ acceptPartialSplitting('${req.id}', ${req.amount}, ${partialAmt}, '${req.to_user}', '${req.description}') }">Accept & Split</button>
                                    </div>`;
                            } else { actionButtons = `<span class="text-xs text-gray-400 italic text-right">Awaiting partner split...</span>`; }
                            break;
                    }
                    item.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div><span class="font-bold text-gray-700">${isDebtor ? 'From' : 'To'}: @${isDebtor ? req.from_user : req.to_user}</span><p class="text-xs text-gray-500 mt-0.5">Item: ${req.description || 'Uncategorized'}</p></div>
                            <div class="text-right"><span class="text-lg font-extrabold ${isDebtor ? 'text-red-500' : 'text-green-600'}">${isDebtor ? '-' : '+'}$${req.amount}</span><div class="mt-1">${statusBadge}</div></div>
                        </div>${actionButtons}`;
                    listDiv.appendChild(item);
                });
            } catch (e) {}
        }

        async function updateStatus(id, newStatus, notifyTarget, notifyActionMessage) {
            try {
                await supabaseClient.from('requests').update({ status: newStatus }).eq('id', id);
                await supabaseClient.from('notifications').insert([{ to_user: notifyTarget, message: `🔔 @${myUsername} ${notifyActionMessage}` }]);
                alert("Status updated!"); await loadRequests();
            } catch (e) {}
        }

        async function loadNotifications() {
            try {
                const { data } = await supabaseClient.from('notifications').select('*').eq('to_user', myUsername).order('created_at', { ascending: false }).limit(20);
                const notiDiv = document.getElementById('noti-list');
                if (!data || data.length === 0) { notiDiv.innerHTML = "<p style='color:gray;'>No notifications.</p>"; return; }
                notiDiv.innerHTML = '';
                data.forEach(noti => {
                    const item = document.createElement('div'); item.className = 'noti-item text-gray-700 bg-white pl-3 pr-1 py-1.5 rounded border border-gray-100 shadow-sm text-[11px] flex justify-between items-center gap-2';
                    item.innerHTML = `<div class="flex-1 leading-relaxed">${noti.message}</div><button onclick="deleteNotification('${noti.id}')" class="text-gray-400 hover:text-gray-600 px-2 py-1 text-xs font-bold">&times;</button>`; 
                    notiDiv.appendChild(item);
                });
            } catch (e) {}
        }

        async function deleteNotification(id) {
            try { await supabaseClient.from('notifications').delete().eq('id', id); await loadNotifications(); } catch (e) {}
        }
    </script>
    
    <script src="split-engine.js"></script>
</body>
</html>
